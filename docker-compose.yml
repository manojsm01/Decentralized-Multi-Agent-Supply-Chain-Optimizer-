version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: supplychainuser
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: supplychain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://supplychainuser:secretpassword@db:5432/supplychain
    env_file:
      - .env
    volumes:
      - ./supply_chain.db:/app/supply_chain.db
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
