services:
  - type: web
    name: supply-chain-optimizer-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: supply-chain-db
          property: connectionString

  - type: web
    name: supply-chain-optimizer-frontend
    env: python
    plan: free
    buildCommand: pip install -r frontend/requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: API_URL
        value: https://supply-chain-optimizer-backend.onrender.com

databases:
  - name: supply-chain-db
    databaseName: supplychain
    user: supplychainuser
    plan: free
